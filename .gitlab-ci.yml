# Stock Verify System - GitLab CI/CD Pipeline
# Runs on push to main and on merge requests

stages:
  - test
  - quality
  - build

variables:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"

# ==========================================
# Backend Tests
# ==========================================
backend-tests:
  stage: test
  image: python:3.10-slim
  services:
    - name: mongo:6.0
      alias: mongodb
    - name: redis:7-alpine
      alias: redis
  variables:
    MONGODB_URL: "mongodb://mongodb:27017/test_db"
    REDIS_URL: "redis://redis:6379"
    JWT_SECRET: "test-secret-key-for-ci-only"
    JWT_REFRESH_SECRET: "test-refresh-secret-for-ci-only"
    ENVIRONMENT: "test"
  cache:
    key: backend-pip
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.production.txt
    - pip install pytest pytest-asyncio pytest-cov httpx
  script:
    - cd backend
    - python -m pytest tests/
        --cov=.
        --cov-report=term-missing
        -v
        --tb=short
        -x
        --ignore=tests/evaluation
        --ignore=tests/performance
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# Backend Quality (Linting & Security)
# ==========================================
backend-quality:
  stage: quality
  image: python:3.10-slim
  cache:
    key: backend-quality
    paths:
      - .cache/pip
  before_script:
    - pip install ruff bandit
  script:
    - ruff check backend/ || true
    - bandit -r backend/ -ll -ii --exclude "*/tests/*" || true
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# Frontend Tests & Build
# ==========================================
frontend-tests:
  stage: test
  image: node:18-slim
  cache:
    key: frontend-npm
    paths:
      - .cache/npm
      - frontend/node_modules
  before_script:
    - cd frontend
    - npm ci --cache ../.cache/npm
  script:
    - npx tsc --noEmit || true
    - npm test -- --coverage --watchAll=false || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
