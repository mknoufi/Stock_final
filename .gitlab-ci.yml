# Stock Verify System - GitLab CI/CD Pipeline
# Runs on push to main and on merge requests

stages:
  - lint
  - test
  - build

variables:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "22"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  # Default fallback if not using GitLab Container Registry
  DOCKER_IMAGE_TAG: $CI_COMMIT_SHA

# ==========================================
# Backend Linting
# ==========================================
backend-lint:
  stage: lint
  image: python:3.10-slim
  cache:
    key: backend-pip
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install ruff bandit
  script:
    - echo "Running Ruff Linter..."
    - ruff check backend/
    - echo "Running Bandit Security Check..."
    - bandit -r backend/ -ll -ii --exclude "*/tests/*"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# Frontend Linting
# ==========================================
frontend-lint:
  stage: lint
  image: node:22-bookworm-slim
  cache:
    key: frontend-npm
    paths:
      - .cache/npm
      - frontend/node_modules
  before_script:
    - cd frontend
    - npm ci --cache ../.cache/npm --legacy-peer-deps
  script:
    - echo "Checking Types..."
    - npm run typecheck
    - echo "Running ESLint..."
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# Backend Tests
# ==========================================
backend-tests:
  stage: test
  image: python:3.10-slim
  services:
    - name: mongo:6.0
      alias: mongodb
    - name: redis:7-alpine
      alias: redis
  variables:
    MONGODB_URL: "mongodb://mongodb:27017/test_db"
    REDIS_URL: "redis://redis:6379"
    JWT_SECRET: "test-secret-key-for-ci-only"
    JWT_REFRESH_SECRET: "test-refresh-secret-for-ci-only"
    ENVIRONMENT: "test"
  cache:
    key: backend-pip
    paths:
      - .cache/pip
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.production.txt
    - pip install -r backend/requirements.dev.txt
  script:
    - cd backend
    - python -m pytest tests/ --cov=app --cov-report=term-missing -v --tb=short -x --ignore=tests/evaluation --ignore=tests/performance
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# Frontend Tests
# ==========================================
frontend-tests:
  stage: test
  image: node:22-bookworm-slim
  cache:
    key: frontend-npm
    paths:
      - .cache/npm
      - frontend/node_modules
  before_script:
    - cd frontend
    - npm ci --cache ../.cache/npm --legacy-peer-deps
  script:
    - npm test -- --coverage --watchAll=false
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# Backend Build
# ==========================================
backend-build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - if [ -n "$CI_REGISTRY_USER" ]; then echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin; fi
  script:
    - IMAGE_NAME=${CI_REGISTRY_IMAGE:-stock-verify}/backend
    - echo "Building Backend Docker image..."
    - docker build -t $IMAGE_NAME:$DOCKER_IMAGE_TAG -t $IMAGE_NAME:latest ./backend
    - if [ -n "$CI_REGISTRY_USER" ]; then docker push $IMAGE_NAME:$DOCKER_IMAGE_TAG; docker push $IMAGE_NAME:latest; fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# Frontend Build
# ==========================================
frontend-build:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - if [ -n "$CI_REGISTRY_USER" ]; then echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin; fi
  script:
    - IMAGE_NAME=${CI_REGISTRY_IMAGE:-stock-verify}/frontend
    - echo "Building Frontend Docker image..."
    - docker build -t $IMAGE_NAME:$DOCKER_IMAGE_TAG -t $IMAGE_NAME:latest ./frontend
    - if [ -n "$CI_REGISTRY_USER" ]; then docker push $IMAGE_NAME:$DOCKER_IMAGE_TAG; docker push $IMAGE_NAME:latest; fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# PR Checks Port
# ==========================================
pr-checks:
  stage: lint
  image: python:3.10-slim
  script:
    - python -m pip install --upgrade pip
    - pip install -r backend/requirements.production.txt
    - pip install pytest pytest-asyncio httpx ruff
    - bash scripts/check_repo_hygiene.sh
    - python scripts/check_duplicate_routes.py
    - cd backend && python -m pytest tests/governance -q
    - cd ..
    - ruff check backend/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ==========================================
# Frontend E2E (Smoke)
# ==========================================
frontend-e2e:
  stage: test
  image: mcr.microsoft.com/playwright:v1.57.0-noble
  services:
    - name: mongo:6.0
      alias: mongodb
    - name: redis:7-alpine
      alias: redis
  variables:
    MONGODB_URL: "mongodb://mongodb:27017/test_db"
    REDIS_URL: "redis://redis:6379"
    JWT_SECRET: "test-secret-key-for-ci-only"
    JWT_REFRESH_SECRET: "test-refresh-secret-for-ci-only"
    ENVIRONMENT: "test"
    AUTO_SEED_DEFAULT_USERS: "true"
    AUTO_SEED_MOCK_ERP_DATA: "true"
    E2E_WEB_PORT: 8081
    E2E_BASE_URL: "http://127.0.0.1:8081"
    E2E_BACKEND_URL: "http://127.0.0.1:8001"
  cache:
    key: frontend-npm
    paths:
      - .cache/npm
      - frontend/node_modules
  before_script:
    - apt-get update && apt-get install -y python3 python3-pip python3-venv curl
    - python3 -m venv /opt/venv
    - export PATH="/opt/venv/bin:$PATH"
    - pip install --upgrade pip
    - pip install -r backend/requirements.production.txt
    - pip install -r backend/requirements.dev.txt
    - cd frontend
    - npm ci --cache ../.cache/npm --legacy-peer-deps
    - npx playwright install chromium
  script:
    - echo "Starting backend server in background..."
    - cd ../backend
    - python -m uvicorn server:app --host 127.0.0.1 --port 8001 &
    - |
      echo "Waiting for backend healthcheck..."
      for i in {1..30}; do
        curl -sSf http://127.0.0.1:8001/health && echo "Backend is healthy!" && break
        echo "Waiting... $i"
        sleep 2
        if [ $i -eq 30 ]; then
          echo "Backend failed to start"
          exit 1
        fi
      done
    - cd ../frontend
    - echo "Starting frontend server and running tests..."
    - npm run e2e:recount-smoke
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
