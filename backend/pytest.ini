[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
addopts = -v --ignore=tests/evaluation -m "not manual"
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    manual: tests that require a running local stack or explicit manual setup
