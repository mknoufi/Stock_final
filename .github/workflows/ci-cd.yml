name: STOCK_VERIFY_2.1 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Code Quality and Security Checks
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          # Disable automatic exit on error to handle retries manually
          set +e
          MAX_RETRIES=3
          RETRY_COUNT=0
          BACKOFF=10

          install_deps() {
            echo "Attempt $((RETRY_COUNT + 1)) of $MAX_RETRIES: Running npm install --legacy-peer-deps"
            npm install --legacy-peer-deps
            return $?
          }

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            install_deps
            EXIT_CODE=$?

            if [ $EXIT_CODE -eq 0 ]; then
              echo "npm install succeeded on attempt $((RETRY_COUNT + 1))"
              exit 0
            fi

            RETRY_COUNT=$((RETRY_COUNT + 1))

            if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
              echo "Install failed. Retrying in ${BACKOFF} seconds..."
              sleep $BACKOFF
              BACKOFF=$((BACKOFF * 2))
              # Clear npm cache before retry to ensure clean state
              npm cache clean --force 2>/dev/null || true
            fi
          done

          echo "All retry attempts failed"
          exit 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r ../requirements.production.txt

      - name: Run frontend linting
        working-directory: ./frontend
        run: npm run lint || true

      - name: Run backend linting
        working-directory: ./backend
        run: |
          pip install ruff
          ruff check . || true
          black --check --line-length=100 . || true

  # Backend Testing
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})' || mongo --eval 'db.runCommand({ping:1})' || exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Wait for MongoDB
        working-directory: ./backend
        run: |
          python << 'EOF'
          import time
          from pymongo import MongoClient
          for i in range(60):
            try:
                client = MongoClient('mongodb://localhost:27017', serverSelectionTimeoutMS=1000)
                client.admin.command('ping')
                print('MongoDB is ready!')
                break
            except Exception as e:
                print(f'Waiting for MongoDB... ({i+1}/60)')
                time.sleep(1)
          else:
            raise Exception('MongoDB did not become ready in time')
          EOF

      - name: Run backend tests with coverage
        working-directory: ./backend
        env:
          JWT_SECRET: test-jwt-secret-for-ci-testing-only-min-32-chars-1234567890
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-for-ci-testing-only-min-32-chars-1234567890
          MONGODB_URL: mongodb://localhost:27017
          TESTING: "true"
        run: |
          pytest --cov=api --cov=services --cov=tests --cov-report=xml --cov-report=html --cov-report=term-missing

  # Frontend Testing
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            frontend/node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false --passWithNoTests
