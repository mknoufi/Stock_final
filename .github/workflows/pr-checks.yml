# Quick Security & Quality Checks
# Runs on all PRs for fast feedback

name: PR Checks

on:
  pull_request:
    branches: [main, develop, my-fix-branch]

jobs:
  quick-checks:
    name: Quick Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Lint Python
        run: |
          pip install ruff
          ruff check backend/ --output-format=github
        continue-on-error: true

      - name: Governance gate
        env:
          GITHUB_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          python tools/governance/governance_gate.py --base "$GITHUB_BASE_SHA" --head "$GITHUB_HEAD_SHA"

      - name: Check commit messages
        run: |
          echo "Checking commit message format..."
          # Add conventional commit check if desired

  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Check PR size
        uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/xs'
          xs_max_size: 10
          s_label: 'size/s'
          s_max_size: 100
          m_label: 'size/m'
          m_max_size: 500
          l_label: 'size/l'
          l_max_size: 1000
          xl_label: 'size/xl'
          fail_if_xl: false
