apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: stock-verify-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - yourdomain.com
      secretName: stock-verify-tls
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: stock-verify-backend
                port:
                  number: 8001
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: stock-verify-backend
                port:
                  number: 8001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stock-verify-frontend
                port:
                  number: 80
