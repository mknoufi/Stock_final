<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login: Backend Unstable</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white overflow-x-hidden min-h-screen flex flex-col items-center justify-center">
<!-- Mobile Container -->
<div class="relative flex w-full max-w-md flex-col bg-background-light dark:bg-background-dark min-h-screen">
<!-- Header with Status Badges -->
<div class="flex items-center justify-between p-4 pb-2">
<div class="flex items-center gap-2">
<!-- Tunnel Badge -->
<div class="flex items-center gap-1 rounded bg-amber-500/10 px-2 py-1 border border-amber-500/20">
<span class="material-symbols-outlined text-amber-500 text-[16px]">vpn_key</span>
<span class="text-amber-500 text-xs font-bold tracking-wide">TUNNEL</span>
</div>
</div>
<!-- Backend Health Badge -->
<div class="flex items-center gap-1 rounded bg-yellow-400/10 px-2 py-1 border border-yellow-400/20">
<span class="material-symbols-outlined text-yellow-400 text-[16px]">warning</span>
<span class="text-yellow-400 text-xs font-bold tracking-wide">UNSTABLE</span>
</div>
</div>
<!-- Main Content Area -->
<div class="flex-1 flex flex-col px-4 pt-2 pb-6">
<div class="mb-8 mt-4">
<h1 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Sign in</h1>
<p class="mt-2 text-slate-500 dark:text-slate-400">Inventory Management System</p>
</div>
<!-- Warning Banner -->
<div class="mb-6 rounded-lg border border-yellow-500/30 bg-yellow-500/5 p-4 relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-yellow-500"></div>
<div class="flex flex-col gap-2">
<div class="flex items-center gap-2 text-yellow-500">
<span class="material-symbols-outlined text-[20px]">dns</span>
<h3 class="text-sm font-bold uppercase tracking-wider">System Alert</h3>
</div>
<p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
                        Mongo SoT is responding slowly. Login may take longer than usual. SQL Observer is currently unavailable.
                    </p>
</div>
</div>
<!-- Login Form -->
<div class="flex flex-col gap-5">
<!-- Operator ID Input -->
<label class="flex flex-col gap-2">
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Operator ID / Email</span>
<div class="relative">
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-3 pl-11 text-base text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors h-12" placeholder="Enter ID..." type="text"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">badge</span>
</div>
</label>
<!-- Password Input -->
<label class="flex flex-col gap-2">
<span class="text-sm font-medium text-slate-700 dark:text-slate-200">Password</span>
<div class="relative group">
<input class="w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800/50 p-3 pl-11 pr-11 text-base text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors h-12" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</label>
<!-- Force Session Toggle (Example of extra governance control) -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer sr-only" type="checkbox"/>
<div class="h-6 w-11 rounded-full bg-slate-200 dark:bg-slate-700 peer-checked:bg-primary transition-colors"></div>
<div class="absolute left-1 top-1 h-4 w-4 rounded-full bg-white transition-transform peer-checked:translate-x-5"></div>
</div>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Force new session</span>
</label>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Login Button with Loading State -->
<button class="relative flex w-full items-center justify-center overflow-hidden rounded-lg bg-primary hover:bg-primary/90 transition-all h-12 mt-2 group disabled:opacity-70 disabled:cursor-not-allowed">
<div class="absolute inset-0 bg-white/20 translate-x-[-100%] animate-[shimmer_2s_infinite]"></div>
<div class="flex items-center gap-2 text-white font-semibold">
<!-- Spinner Icon -->
<span class="material-symbols-outlined animate-spin text-[20px]">progress_activity</span>
<span>Connecting...</span>
</div>
</button>
<div class="text-center mt-4">
<a class="text-sm text-slate-500 hover:text-slate-400 dark:text-slate-500 dark:hover:text-slate-400 transition-colors" href="#">Contact IT Support</a>
</div>
</div>
</div>
<!-- Footer / Version Info -->
<div class="p-4 text-center">
<p class="text-xs text-slate-500 dark:text-slate-600 font-mono">v4.2.1-beta (Build 8920)</p>
</div>
</div>
<style>
        @keyframes shimmer {
            100% {
                transform: translateX(100%);
            }
        }
    </style>
</body></html>
