<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Confirm Conflict Fork</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Config -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #101922; 
        }
        ::-webkit-scrollbar-thumb {
            background: #2d3748; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a5568; 
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col font-display antialiased overflow-hidden">
<!-- Header -->
<div class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark border-b border-gray-200 dark:border-gray-800 sticky top-0 z-10">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors text-gray-900 dark:text-white">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">
            Create Conflict Fork
        </h2>
</div>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-4 py-6 flex flex-col gap-6">
<!-- Info Card -->
<div class="relative overflow-hidden rounded-xl bg-gradient-to-br from-[#1c2127] to-[#111418] border border-gray-800 shadow-lg">
<!-- Decorative accent line -->
<div class="absolute top-0 left-0 w-1 h-full bg-primary"></div>
<div class="p-5 flex flex-col gap-4">
<div class="flex items-start gap-4">
<div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center shrink-0 text-primary">
<span class="material-symbols-outlined">call_split</span>
</div>
<div class="flex-1">
<h3 class="text-white text-lg font-bold leading-tight mb-1">Forking Audit Trail</h3>
<p class="text-gray-400 text-sm leading-relaxed">
                            You have chosen to keep your local changes. This will create a separate audit branch (Fork) for supervisor review.
                        </p>
</div>
</div>
</div>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-5">
<!-- Fork Reason Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-300" for="fork-reason">Fork Reason</label>
<div class="relative">
<select class="w-full appearance-none rounded-lg bg-[#1c2127] border border-gray-700 text-white placeholder-gray-500 text-base p-4 pr-10 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="fork-reason">
<option disabled="" selected="" value="">Select a reason...</option>
<option value="verified">Physical Count Re-verified</option>
<option value="damage">Damaged Goods Found</option>
<option value="pallet">Different Pallet Found</option>
<option value="barcode">Incorrect Barcode</option>
<option value="other">Other</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<!-- Additional Note Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-gray-300" for="additional-note">Additional Note</label>
<textarea class="w-full rounded-lg bg-[#1c2127] border border-gray-700 text-white placeholder-gray-500 text-base p-4 min-h-[140px] resize-none focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="additional-note" placeholder="Describe the situation for the supervisor..."></textarea>
</div>
</div>
<!-- Audit Visibility Badge -->
<div class="mt-auto pt-4 flex justify-center">
<div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-primary/10 border border-primary/20">
<span class="material-symbols-outlined text-primary text-[18px]">link</span>
<span class="text-primary text-sm font-medium">Conflict Branch linked to SESS-9928</span>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="p-4 pb-8 bg-background-light dark:bg-background-dark border-t border-gray-200 dark:border-gray-800 flex flex-col gap-3 sticky bottom-0 z-10 backdrop-blur-sm bg-opacity-95 dark:bg-opacity-95">
<button class="w-full bg-primary hover:bg-blue-600 text-white font-semibold py-4 rounded-xl text-base shadow-lg shadow-blue-900/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
            Confirm Fork &amp; Submit
        </button>
<button class="w-full bg-transparent hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-400 font-medium py-3 rounded-xl text-base transition-colors active:scale-[0.98]">
            Back to Comparison
        </button>
</div>
</body></html>
