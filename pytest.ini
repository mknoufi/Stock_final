[pytest]
# Root-level pytest config so `pytest` from the repo root only discovers
# real backend tests (and doesn't accidentally collect helper scripts).
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = backend/tests
addopts = -v --ignore=backend/tests/evaluation -m "not manual"
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    manual: tests that require a running local stack or explicit manual setup
