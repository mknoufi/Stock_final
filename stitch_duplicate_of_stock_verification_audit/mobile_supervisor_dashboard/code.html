<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#2b7cee",
            "background-light": "#f6f7f8",
            "background-dark": "#101822",
            "surface-dark": "#1e293b",
            "accent-amber": "#f59e0b",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .safe-area-bottom {
      padding-bottom: env(safe-area-inset-bottom);
    }
    .safe-area-top {
      padding-top: env(safe-area-inset-top);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- iOS Top Bar Spacer -->
<div class="h-12 safe-area-top"></div>
<!-- Header -->
<header class="px-6 py-4 flex justify-between items-center">
<div>
<h1 class="text-2xl font-bold tracking-tight">Supervisor</h1>
<p class="text-sm text-slate-500 dark:text-slate-400">Warehouse Management</p>
</div>
<div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
<span class="material-icons-round text-primary text-2xl">account_circle</span>
</div>
</header>
<main class="px-5 pb-24">
<!-- Active Session Card -->
<section class="mt-4">
<div class="bg-surface-dark/50 dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl p-5 shadow-xl relative overflow-hidden">
<div class="absolute top-0 right-0 p-3">
<span class="flex h-2 w-2 relative">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
</span>
</div>
<div class="mb-4">
<p class="text-xs font-semibold text-primary uppercase tracking-wider mb-1">Active Session</p>
<h2 class="text-xl font-bold">Warehouse A - Zone 1</h2>
</div>
<!-- Progress Bars -->
<div class="space-y-5 mb-6">
<!-- Scanned Progress -->
<div>
<div class="flex justify-between items-end mb-2">
<span class="text-sm font-medium text-slate-400">Scanned Items</span>
<span class="text-sm font-bold">142<span class="text-slate-500 font-normal"> / 200</span></span>
</div>
<div class="w-full bg-slate-800 rounded-full h-2.5">
<div class="bg-primary h-2.5 rounded-full" style="width: 71%"></div>
</div>
</div>
<!-- Accuracy Progress -->
<div>
<div class="flex justify-between items-end mb-2">
<span class="text-sm font-medium text-slate-400">Data Accuracy</span>
<span class="text-sm font-bold text-primary">98%</span>
</div>
<div class="w-full bg-slate-800 rounded-full h-2.5">
<div class="bg-primary h-2.5 rounded-full" style="width: 98%"></div>
</div>
</div>
</div>
<!-- Join Session Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 transition-transform active:scale-[0.98]">
<span class="material-icons-round">login</span>
          Join Session
        </button>
</div>
</section>
<!-- Summary Metrics Row -->
<section class="mt-8">
<div class="grid grid-cols-3 gap-3">
<div class="bg-white dark:bg-surface-dark/40 p-4 rounded-lg border border-slate-100 dark:border-slate-800 text-center">
<span class="material-icons-round text-primary/80 text-xl mb-1">qr_code_scanner</span>
<p class="text-xl font-bold">1,240</p>
<p class="text-[10px] uppercase font-bold text-slate-500">Total Scanned</p>
</div>
<div class="bg-white dark:bg-surface-dark/40 p-4 rounded-lg border border-slate-100 dark:border-slate-800 text-center">
<span class="material-icons-round text-accent-amber text-xl mb-1">error_outline</span>
<p class="text-xl font-bold">12</p>
<p class="text-[10px] uppercase font-bold text-slate-500">Variances</p>
</div>
<div class="bg-white dark:bg-surface-dark/40 p-4 rounded-lg border border-slate-100 dark:border-slate-800 text-center">
<span class="material-icons-round text-slate-400 text-xl mb-1">pending_actions</span>
<p class="text-xl font-bold">5</p>
<p class="text-[10px] uppercase font-bold text-slate-500">Pending</p>
</div>
</div>
</section>
<!-- Action Grid (2x2) -->
<section class="mt-8">
<div class="grid grid-cols-2 gap-4">
<!-- New Session -->
<button class="aspect-square bg-primary/10 dark:bg-primary/20 border border-primary/20 rounded-xl flex flex-col items-center justify-center gap-3 active:scale-[0.96] transition-transform">
<div class="w-14 h-14 rounded-full bg-primary flex items-center justify-center shadow-lg shadow-primary/30">
<span class="material-icons-round text-white text-3xl">add</span>
</div>
<span class="font-bold text-sm">New Session</span>
</button>
<!-- View Variances -->
<button class="aspect-square bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl flex flex-col items-center justify-center gap-3 active:scale-[0.96] transition-transform">
<div class="w-14 h-14 rounded-full bg-accent-amber/20 flex items-center justify-center">
<span class="material-icons-round text-accent-amber text-3xl">warning_amber</span>
</div>
<span class="font-bold text-sm">View Variances</span>
</button>
<!-- Audit Logs -->
<button class="aspect-square bg-white dark:bg-surface-dark border border-slate-200 dark:border-slate-800 rounded-xl flex flex-col items-center justify-center gap-3 active:scale-[0.96] transition-transform">
<div class="w-14 h-14 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center">
<span class="material-icons-round text-slate-400 text-3xl">description</span>
</div>
<span class="font-bold text-sm">Audit Logs</span>
</button>
<!-- Inventory Map -->
<div class="aspect-square relative rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 group active:scale-[0.96] transition-transform">
<img class="absolute inset-0 w-full h-full object-cover opacity-60 grayscale brightness-50" data-alt="Dark stylized map of warehouse zones" data-location="Warehouse Area" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQLOcEt1U0QeWO-hxeV4gyugDQxQC9uDgYLzdTB-SU8D7o3-R8FWjwpJ5Pk9vXn-7oYKPw32ZGlm7IoJZexlbRW5oQMLi4gAyEXxDyk9n9YUZZyGGWWktFK1Xttatqqs7gGaYmSf3ZCJspsFPQaC3Wnty_lvOiLG8rIA9cNgH7Hlas_6KHgI9Y7r-CLvc_DnA0nblfYiwBstyAUu00XpjM3TfRS5RrHP5AgDbBljOxGcGD3o9MgLsU00fevFtXt_pRKa5JI1n1koc"/>
<div class="absolute inset-0 bg-gradient-to-t from-background-dark/80 to-transparent"></div>
<div class="absolute inset-0 flex flex-col items-center justify-center gap-3">
<div class="w-14 h-14 rounded-full bg-primary/20 backdrop-blur-md flex items-center justify-center border border-primary/40">
<span class="material-icons-round text-primary text-3xl">map</span>
</div>
<span class="font-bold text-sm text-white">Inventory Map</span>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-background-dark/80 backdrop-blur-xl border-t border-slate-200 dark:border-slate-800 safe-area-bottom">
<div class="flex justify-around items-center h-16">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-icons-round">dashboard</span>
<span class="text-[10px] font-bold">Dashboard</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-icons-round">inventory_2</span>
<span class="text-[10px] font-medium">Stock</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-icons-round">bar_chart</span>
<span class="text-[10px] font-medium">Reports</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500">
<span class="material-icons-round">settings</span>
<span class="text-[10px] font-medium">Settings</span>
</button>
</div>
</nav>
</body></html>
