<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b7cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .floating-label-input:focus-within label,
        .floating-label-input input:not(:placeholder-shown) + label {
            transform: translateY(-1.5rem) scale(0.85);
            color: #2b7cee;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
<!-- Phone Container Simulation -->
<div class="w-full max-w-[400px] min-h-[812px] flex flex-col relative overflow-hidden">
<!-- Status Bar Space (iOS Style) -->
<div class="h-12 w-full flex justify-between items-center px-6">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-icons-round text-sm">signal_cellular_alt</span>
<span class="material-icons-round text-sm">wifi</span>
<span class="material-icons-round text-sm">battery_full</span>
</div>
</div>
<!-- Branding Section -->
<div class="mt-8 mb-8 text-center px-6">
<div class="w-16 h-16 bg-primary/20 rounded-xl flex items-center justify-center mx-auto mb-4 border border-primary/30">
<span class="material-icons-round text-primary text-4xl">inventory_2</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Stock Verify 2026</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1 font-medium">Create your professional account</p>
</div>
<!-- Registration Form Container -->
<div class="glass-panel rounded-xl p-6 mx-4 shadow-2xl relative overflow-hidden">
<!-- Subtle Decorative Gradient -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/10 rounded-full blur-3xl"></div>
<form class="space-y-5 relative z-10">
<!-- Full Name -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-lg">person</span>
</div>
<input class="w-full bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-lg py-3 pl-10 pr-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-500" placeholder="Full Name" type="text"/>
</div>
<!-- Email Address -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-lg">mail</span>
</div>
<input class="w-full bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-lg py-3 pl-10 pr-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-500" placeholder="Email Address" type="email"/>
</div>
<!-- Role Selection -->
<div class="space-y-2">
<label class="text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Account Role</label>
<div class="grid grid-cols-2 gap-3">
<label class="cursor-pointer">
<input checked="" class="hidden peer" name="role" type="radio" value="staff"/>
<div class="flex flex-col items-center justify-center p-3 rounded-lg border border-slate-200 dark:border-slate-700/50 bg-slate-100/50 dark:bg-slate-800/50 peer-checked:border-primary peer-checked:bg-primary/10 transition-all">
<span class="material-icons-round text-slate-400 peer-checked:text-primary mb-1">badge</span>
<span class="text-xs font-medium">Staff</span>
</div>
</label>
<label class="cursor-pointer">
<input class="hidden peer" name="role" type="radio" value="supervisor"/>
<div class="flex flex-col items-center justify-center p-3 rounded-lg border border-slate-200 dark:border-slate-700/50 bg-slate-100/50 dark:bg-slate-800/50 peer-checked:border-primary peer-checked:bg-primary/10 transition-all">
<span class="material-icons-round text-slate-400 peer-checked:text-primary mb-1">admin_panel_settings</span>
<span class="text-xs font-medium">Supervisor</span>
</div>
</label>
</div>
</div>
<!-- Password with Floating-like behavior -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-lg">lock</span>
</div>
<input class="w-full bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-lg py-3 pl-10 pr-10 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-500" placeholder="Password" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center" type="button">
<span class="material-icons-round text-slate-400 hover:text-primary transition-colors text-lg">visibility</span>
</button>
</div>
<!-- Confirm Password -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-icons-round text-slate-400 group-focus-within:text-primary transition-colors text-lg">verified_user</span>
</div>
<input class="w-full bg-slate-100/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-lg py-3 pl-10 pr-10 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-500" placeholder="Confirm Password" type="password"/>
</div>
<!-- Terms & Conditions -->
<div class="flex items-start gap-3 px-1">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-transparent transition-all" id="terms" type="checkbox"/>
</div>
<label class="text-xs text-slate-500 dark:text-slate-400 leading-tight" for="terms">
                        I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<!-- Create Account Button -->
<button class="w-full py-4 rounded-lg bg-gradient-to-r from-primary to-[#1a4a91] text-white font-bold text-sm shadow-lg shadow-primary/20 hover:shadow-primary/40 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4 uppercase tracking-widest" type="submit">
<span>Create Account</span>
<span class="material-icons-round text-sm">arrow_forward</span>
</button>
</form>
</div>
<!-- Sign In Footer -->
<div class="mt-auto py-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                Already have an account? 
                <a class="text-primary font-bold ml-1 hover:underline" href="#">Sign In</a>
</p>
</div>
<!-- iOS Home Indicator -->
<div class="h-1.5 w-32 bg-slate-300 dark:bg-slate-700 rounded-full mx-auto mb-2 opacity-50"></div>
</div>
</body></html>
